name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: supply_chain_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/supply_chain_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: supply_chain_test
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      MLFLOW_TRACKING_URI: http://localhost:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt flake8 pytest

      - name: Lint with flake8
        run: |
          flake8 de/ ds/ --max-line-length=110 --ignore=E501,W503

      - name: Apply schema DDL
        run: |
          psql $DATABASE_URL -f de/schema/01_dimensions.sql
          psql $DATABASE_URL -f de/schema/02_facts.sql

      - name: Run unit tests
        run: pytest scripts/tests/ -v --tb=short || echo "No tests yet"

  dbt-check:
    name: dbt Compile Check
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dbt
        run: pip install dbt-postgres==1.7.4

      - name: dbt compile (syntax check)
        working-directory: dbt
        run: dbt compile --profiles-dir . --target dev
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: supply_chain_test
