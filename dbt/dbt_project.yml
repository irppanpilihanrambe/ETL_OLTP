name: etl_oltp
version: "1.0.0"
config-version: 2

profile: etl_oltp

model-paths:  ["models"]
test-paths:   ["tests"]
macro-paths:  ["macros"]
target-path:  "target"
clean-targets: ["target", "dbt_packages"]

models:
  etl_oltp:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts
    analysis:
      +materialized: table
      +schema: analysis

vars:
  start_date: "2022-01-01"
